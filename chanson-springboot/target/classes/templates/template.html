<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="utf-8">
    <title>Gestion des Chansons</title>
    <link rel="stylesheet" type="text/css"
          th:href="@{/webjars/bootstrap/4.3.1/css/bootstrap.min.css}"/>
    <style>
        /* Ouvre le dropdown au survol sans avoir besoin de jQuery */
        .nav-item.dropdown:hover > .dropdown-menu {
            display: block;
        }
        .dropdown-menu {
            margin-top: 0;
        }
    </style>
</head>
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-sm bg-dark navbar-dark">
    <a class="navbar-brand" href="#">Gestion Chansons</a>

    <ul class="navbar-nav">
        <li class="nav-item">
            <a class="nav-link" th:href="@{/ListeChansons}">Home</a>
        </li>

        <!-- Menu Chansons -->
        <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle"
               href="#"
               id="navbarDropdownChansons"
               role="button"
               data-toggle="dropdown"
               aria-haspopup="true"
               aria-expanded="false">
                Chansons
            </a>
            <div class="dropdown-menu" aria-labelledby="navbarDropdownChansons">
                <a sec:authorize="hasAnyAuthority('ADMIN','AGENT')"
                   class="dropdown-item" th:href="@{/showCreate}">Ajouter</a>
                <a class="dropdown-item" th:href="@{/ListeChansons}">Lister</a>
            </div>
        </li>
    </ul>

    <!-- Menu utilisateur a droite -->
    <ul class="navbar-nav ml-auto">
        <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle"
               href="#"
               id="navbarDropdownUser"
               role="button"
               data-toggle="dropdown"
               aria-haspopup="true"
               aria-expanded="false">
                <span sec:authentication="name"></span>
            </a>
			<div class="dropdown-menu dropdown-menu-right" aria-labelledby="navbarDropdownUser">
			    <form th:action="@{/logout}" method="post" style="display:inline">
			        <button type="submit" class="dropdown-item text-danger">Déconnexion</button>
			    </form>
			    <a class="dropdown-item" href="#">Profil</a>
			</div>
        </li>
    </ul>
</nav>

<script th:src="@{/webjars/jquery/3.5.1/jquery.min.js}"></script>
<script th:src="@{/webjars/bootstrap/4.3.1/js/bootstrap.min.js}"></script>

</body>
</html>
